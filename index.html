<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>한국 끝말잇기 VS AI</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Jua&display=swap');

        * {
            box-sizing: border-box;
            font-family: 'Jua', 'Malgun Gothic', sans-serif;
            letter-spacing: 1px;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            color: #fff;
        }
        #app {
            width: 100%;
            max-width: 400px;
            background-color: #0a0a0a;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.15);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            height: 100vh;
            border-left: 2px solid #222;
            border-right: 2px solid #222;
        }
        
        .header {
            text-align: center;
            font-size: 26px;
            padding: 15px;
            color: #fff;
            text-shadow: 0 0 5px #fff, 0 0 10px #0ff, 0 0 20px #0ff;
            border-bottom: 2px solid rgba(0, 255, 255, 0.3);
            background: #111;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .screen {
            display: none;
            flex-direction: column;
            padding: 20px;
            gap: 15px;
            flex: 1;
            overflow-y: auto;
        }
        .screen.active {
            display: flex;
        }
        
        button {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
            --neon: #fff; 
            background-color: var(--neon);
            color: #000; 
            border: 2px solid #fff;
            box-shadow: 0 0 12px var(--neon), inset 0 0 10px rgba(255,255,255,0.6);
        }
        button:active {
            box-shadow: 0 0 25px var(--neon), inset 0 0 15px #fff;
            transform: scale(0.96);
        }
        button span { pointer-events: none; }

        .neon-cyan { --neon: #00ffff; }
        .neon-lime { --neon: #39ff14; }
        .neon-yellow { --neon: #ffff00; }
        .neon-orange { --neon: #ff8800; }
        .neon-pink { --neon: #ff00ff; }
        .neon-purple { --neon: #b026ff; color: #fff; } 
        .neon-red { --neon: #ff003c; color: #fff; }
        .neon-shop-1 { --neon: #00fa9a; }
        .neon-shop-2 { --neon: #ff1493; color: #fff; }
        .neon-shop-3 { --neon: #1e90ff; color: #fff; }
        .neon-shop-4 { --neon: #ffd700; }

        .main-info {
            text-align: center;
            font-size: 22px;
            color: #ffd700;
            text-shadow: 0 0 10px #ffd700;
            margin-bottom: 5px;
        }
        .section-title {
            text-align: center;
            color: #ccc;
            font-size: 15px;
            margin: 5px 0;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 5px #fff;
        }

        .status-board {
            border: 2px solid var(--neon, #0ff);
            padding: 15px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            font-size: 18px;
            background: #111;
            box-shadow: 0 0 10px var(--neon, #0ff);
        }
        
        .word-display {
            font-size: 42px;
            text-align: center;
            margin: 20px 0;
            color: #fff;
            text-shadow: 0 0 10px #0ff, 0 0 20px #0ff, 0 0 30px #0ff;
        }
        
        input[type="text"] {
            width: 100%;
            padding: 15px;
            font-size: 20px;
            background-color: #000;
            color: #0ff;
            border: 3px solid #0ff;
            border-radius: 12px;
            text-align: center;
            outline: none;
            box-shadow: 0 0 15px #0ff, inset 0 0 10px rgba(0,255,255,0.2);
            text-shadow: 0 0 5px #0ff;
            margin-bottom: 10px;
            font-weight: bold;
        }
        
        .timer-bar-container {
            width: 100%;
            height: 18px;
            background-color: #222;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 10px;
            border: 2px solid #555;
        }
        .timer-bar {
            width: 100%;
            height: 100%;
            background-color: #ff003c;
            box-shadow: 0 0 15px #ff003c;
            transition: width 0.1s linear;
        }
        
        #msg-box {
            text-align: center;
            color: #ff00ff;
            text-shadow: 0 0 8px #ff00ff;
            font-size: 18px;
            min-height: 25px;
            font-weight: bold;
        }

        .item-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 5px;
        }
        .item-btn {
            padding: 10px;
            font-size: 15px;
            flex-direction: column;
            justify-content: center;
            gap: 4px;
        }
        
        /* 명예의 전당 (랭킹) 스타일 */
        .rank-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .rank-item {
            background: #222;
            margin-bottom: 10px;
            padding: 15px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            border-left: 5px solid #ffd700;
        }

        @keyframes blink { 50% { opacity: 0.3; } }
        .loading { animation: blink 1s infinite; color: #ff8800; text-shadow: 0 0 10px #ff8800;}
    </style>
</head>
<body>

<div id="app">
    <div class="header">
        <span>한국 끝말잇기</span>
        <button style="width:auto; padding:5px 15px; font-size:14px;" class="neon-yellow" onclick="showLeaderboard()">🏆 랭킹</button>
    </div>

    <div id="screen-home" class="screen active">
        <div class="main-info">💰 자산: <span id="home-money">0</span>원</div>
        
        <div class="section-title">--- LEVEL SELECT ---</div>
        <button class="neon-cyan" onclick="startGame('초보 AI', 15)"><span>초보 AI</span></button>
        <button class="neon-lime" onclick="startGame('중급 AI', 12)"><span>중급 AI</span></button>
        <button class="neon-yellow" onclick="startGame('고수 AI', 9)"><span>고수 AI</span></button>
        <button class="neon-orange" onclick="startGame('마스터 AI', 7)"><span>마스터 AI</span></button>
        <button class="neon-pink" onclick="startGame('울트라 AI', 5)"><span>울트라 AI</span></button>
        <button class="neon-purple" onclick="startGame('슈퍼 AI', 3)"><span>슈퍼 AI</span></button>
        <button class="neon-red" onclick="startGame('[최강 극악 Boss] 이수 AI', 2)"><span>[최강 극악 Boss] 이수 AI</span></button>

        <div class="section-title" style="margin-top: 15px;">--- ITEM STORE ---</div>
        
        <button class="neon-shop-1" onclick="buyItem('hint', 5000)">
            <span>💡 힌트 구매</span><span>5,000 원</span>
        </button>
        <button class="neon-shop-2" onclick="buyItem('pass', 10000)">
            <span>⏭️ 게임 패스</span><span>10,000 원</span>
        </button>
        <button class="neon-shop-3" onclick="buyItem('time', 15000)">
            <span>⏳ 시간 정지</span><span>15,000 원</span>
        </button>
        <button class="neon-shop-4" onclick="buyItem('shield', 20000)">
            <span>🛡️ 쉴드 보호</span><span>20,000 원</span>
        </button>
    </div>

    <div id="screen-game" class="screen">
        <div class="status-board" id="game-status-board">
            <div>목숨: <span id="ui-lives">❤️❤️❤️</span> <span id="ui-shield" style="display:none; text-shadow:0 0 10px #ffd700;">🛡️</span></div>
            <div>💰 <span id="ui-money">0</span></div>
        </div>
        
        <div class="timer-bar-container">
            <div id="timer-bar" class="timer-bar"></div>
        </div>
        
        <div id="ui-ai-name" class="section-title">상대: 초보 AI</div>
        <div id="ui-current-word" class="word-display">자전거</div>
        
        <div id="msg-box"></div>

        <input type="text" id="word-input" placeholder="단어 입력 (엔터)" onkeypress="if(event.key === 'Enter') submitWord()" autocomplete="off">
        <button class="neon-cyan" style="justify-content:center;" onclick="submitWord()" id="btn-submit">단어 제출하기</button>
        
        <div class="section-title" style="margin-top: 10px;">--- INVENTORY ---</div>
        <div class="item-grid">
            <button class="neon-shop-1 item-btn" onclick="useItem('hint')">
                <span>💡 힌트</span><span id="inv-hint">보유: 0</span>
            </button>
            <button class="neon-shop-2 item-btn" onclick="useItem('pass')">
                <span>⏭️ 패스</span><span id="inv-pass">보유: 0</span>
            </button>
            <button class="neon-shop-3 item-btn" onclick="useItem('time')">
                <span>⏳ 시간정지</span><span id="inv-time">보유: 0</span>
            </button>
            <button class="neon-shop-4 item-btn" onclick="useItem('shield')">
                <span>🛡️ 쉴드</span><span id="inv-shield">보유: 0</span>
            </button>
        </div>

        <button class="neon-red" style="justify-content:center; margin-top:10px;" onclick="gameOver(true)">포기하고 메인으로</button>
    </div>

    <div id="screen-leaderboard" class="screen">
        <h2 style="text-align:center; color:#ffd700; text-shadow:0 0 10px #ffd700;">🏆 명예의 전당 🏆</h2>
        <div id="leaderboard-loading" style="text-align:center; color:#0ff;">데이터 불러오는 중...</div>
        <ul id="leaderboard-list" class="rank-list">
            </ul>
        <button class="neon-cyan" style="justify-content:center; margin-top:20px;" onclick="goHome()">돌아가기</button>
    </div>
</div>

<script src="chat.js"></script>
<script>
    // 시현님의 Supabase 정보 세팅 완료 (API 기본 도메인만 사용)
    const SUPABASE_URL = 'https://qxmzmccdmbrkviwhsyyv.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF4bXptY2NkbWJya3Zpd2hzeXl2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2ODM2OTAsImV4cCI6MjA5OTI1OTY5MH0.eXqtQaqQXF8Y3yeOuQ6k2OTAfabLl04Aw3DRWW1Lzt0';
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let money = 0; 
    let lives = 3;
    let hasShield = false;
    let currentWord = "자전거";
    let timerMax = 15;
    let timeLeft = 15;
    let timerInterval = null;
    let isTimeStopped = false;
    let isAITurnActive = false;
    let usedWords = ["자전거"];
    let currentDifficulty = ""; 
    let inventory = { hint: 0, pass: 0, time: 0, shield: 0 };

    const easyDict = ["가지", "바다", "사자", "기차", "나비", "다리", "마술", "바지", "사과", "아기", "자전거", "타조", "파도", "하마"];
    const hardDict = ["해질녘", "나트륨", "이리듐", "밥그릇", "산기슭", "사기꾼", "장사꾼", "기쁨", "여름", "씨름"];
    const normalDict = ["거미", "미술", "술래", "래퍼", "퍼즐", "막내", "내일", "일기", "차표", "표지", "지구", "구슬", "이유", "유리", "장미", "미로", "로봇", "물개"];

    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
        updateUI();
    }

    function goHome() {
        clearInterval(timerInterval);
        showScreen('screen-home');
    }

    function startGame(aiName, timeLimit) {
        money = 0; 
        lives = 3;
        hasShield = false;
        currentWord = "자전거";
        usedWords = ["자전거"];
        inventory = { hint: 0, pass: 0, time: 0, shield: 0 }; 
        timerMax = timeLimit;
        currentDifficulty = aiName; 
        
        const aiNameUI = document.getElementById('ui-ai-name');
        aiNameUI.innerText = `상대: ${aiName}`;
        
        const board = document.getElementById('game-status-board');
        if(aiName.includes('이수')) board.style.setProperty('--neon', '#ff003c');
        else if(aiName.includes('슈퍼')) board.style.setProperty('--neon', '#b026ff');
        else board.style.setProperty('--neon', '#00ffff');

        showScreen('screen-game');
        startTimer();
    }

    function startTimer() {
        clearInterval(timerInterval);
        timeLeft = timerMax;
        isTimeStopped = false;
        isAITurnActive = false;
        
        document.getElementById('word-input').disabled = false;
        document.getElementById('btn-submit').disabled = false;

        updateTimerBar();

        timerInterval = setInterval(() => {
            if(isTimeStopped || isAITurnActive) return; 
            timeLeft -= 0.1;
            updateTimerBar();
            if (timeLeft <= 0) handleLifeLoss("시간 초과!");
        }, 100);
    }

    function updateTimerBar() {
        const bar = document.getElementById('timer-bar');
        const percentage = Math.max(0, (timeLeft / timerMax) * 100);
        bar.style.width = percentage + '%';
        if (isTimeStopped) {
            bar.style.backgroundColor = '#1e90ff';
            bar.style.boxShadow = '0 0 15px #1e90ff';
        } else {
            bar.style.backgroundColor = '#ff003c';
            bar.style.boxShadow = '0 0 15px #ff003c';
        }
    }

    function updateUI() {
        document.getElementById('home-money').innerText = money.toLocaleString();
        document.getElementById('ui-money').innerText = money.toLocaleString();
        document.getElementById('ui-lives').innerText = '❤️'.repeat(lives);
        document.getElementById('ui-shield').style.display = hasShield ? 'inline' : 'none';
        
        const wordDisplay = document.getElementById('ui-current-word');
        wordDisplay.innerText = currentWord;
        wordDisplay.classList.remove('loading');

        document.getElementById('inv-hint').innerText = `보유: ${inventory.hint}`;
        document.getElementById('inv-pass').innerText = `보유: ${inventory.pass}`;
        document.getElementById('inv-time').innerText = `보유: ${inventory.time}`;
        document.getElementById('inv-shield').innerText = `보유: ${inventory.shield}`;

        const input = document.getElementById('word-input');
        input.value = "";
        if(!isAITurnActive) input.focus();
    }

    function showMessage(msg) {
        const box = document.getElementById('msg-box');
        box.innerText = msg;
        setTimeout(() => box.innerText = "", 2500);
    }

    async function submitWord() {
        if(isAITurnActive) return;

        const input = document.getElementById('word-input').value.trim();
        if (input.length < 2) { showMessage("2글자 이상 입력하세요!"); return; }

        const lastChar = currentWord.charAt(currentWord.length - 1);
        if (input.charAt(0) !== lastChar) { handleLifeLoss(`'${lastChar}'(으)로 시작해야 합니다!`); return; }
        if (usedWords.includes(input)) { handleLifeLoss("이미 사용한 단어입니다!"); return; }

        usedWords.push(input);
        currentWord = input;
        
        if(currentDifficulty.includes('이수')) money += 10000;
        else if(currentDifficulty.includes('마스터') || currentDifficulty.includes('울트라') || currentDifficulty.includes('슈퍼')) money += 5000;
        else money += 1500; 
        
        executeAITurn();
    }

    function handleLifeLoss(reason) {
        clearInterval(timerInterval);
        if (hasShield) {
            hasShield = false;
            showMessage(`${reason} - 🛡️ 쉴드 방어!`);
            startTimer(); 
            updateUI();
            return;
        }
        lives--;
        showMessage(`${reason} - 목숨 감소!`);
        updateUI();
        
        if (lives <= 0) {
            gameOver(false);
        } else {
            startTimer(); 
        }
    }

    async function gameOver(isSurrender) {
        clearInterval(timerInterval);
        const reason = isSurrender ? "포기했습니다." : "목숨을 모두 잃었습니다.";
        
        if(money > 0) {
            const nickname = prompt(`${reason}\n최종 획득 자산: ${money}원!\n랭킹에 등록할 닉네임을 입력하세요.`, "이름없는고수");
            
            if(nickname) {
                try {
                    const { data, error } = await supabase
                        .from('leaderboard')
                        .insert([{ nickname: nickname, score: money }]);
                        
                    if(error) throw error;
                    alert("랭킹 등록 완료!");
                } catch (err) {
                    console.error(err);
                    alert("DB 연결 오류: 기록이 저장되지 않았습니다.");
                }
            }
        } else {
            alert(`${reason}\n아쉽게도 자산을 얻지 못해 랭킹에 등록되지 않습니다.`);
        }
        goHome();
    }

    async function showLeaderboard() {
        showScreen('screen-leaderboard');
        const listEl = document.getElementById('leaderboard-list');
        const loadingEl = document.getElementById('leaderboard-loading');
        
        listEl.innerHTML = "";
        loadingEl.style.display = "block";

        try {
            const { data, error } = await supabase
                .from('leaderboard')
                .select('*')
                .order('score', { ascending: false })
                .limit(10);

            if (error) throw error;

            loadingEl.style.display = "none";
            
            if(data.length === 0) {
                listEl.innerHTML = "<div style='text-align:center; color:#888;'>아직 등록된 랭킹이 없습니다.</div>";
                return;
            }

            data.forEach((user, index) => {
                const li = document.createElement('li');
                li.className = 'rank-item';
                let rankIcon = `${index + 1}위`;
                if(index === 0) rankIcon = "🥇 1위";
                if(index === 1) rankIcon = "🥈 2위";
                if(index === 2) rankIcon = "🥉 3위";

                li.innerHTML = `
                    <span style="font-weight:bold;">${rankIcon} - ${user.nickname}</span>
                    <span style="color:#00fa9a;">💰 ${user.score.toLocaleString()}원</span>
                `;
                listEl.appendChild(li);
            });
        } catch (err) {
            loadingEl.innerText = "랭킹을 불러오는데 실패했습니다.";
            console.error(err);
        }
    }

    async function executeAITurn() {
        isAITurnActive = true;
        clearInterval(timerInterval);
        
        document.getElementById('word-input').disabled = true;
        document.getElementById('btn-submit').disabled = true;

        const wordDisplay = document.getElementById('ui-current-word');
        wordDisplay.innerText = "AI 생각중...";
        wordDisplay.classList.add('loading');
        updateUI();

        const lastChar = currentWord.charAt(currentWord.length - 1);
        
        let aiWord = await getAIWord(lastChar, usedWords, currentDifficulty);

        if (!aiWord) {
            let targetDict = normalDict;
            if(currentDifficulty.includes('초보')) targetDict = easyDict;
            else if(currentDifficulty.includes('이수')) targetDict = hardDict; 

            const possibleWords = targetDict.filter(w => w.charAt(0) === lastChar && !usedWords.includes(w));
            if (possibleWords.length > 0) {
                aiWord = possibleWords[Math.floor(Math.random() * possibleWords.length)];
            } else {
                if(currentDifficulty.includes('이수')) {
                    const hardSuffix = ["늄", "듐", "릇", "슭", "꾼"];
                    aiWord = lastChar + hardSuffix[Math.floor(Math.random() * hardSuffix.length)];
                } else {
                    const easySuffix = ["기", "자", "물", "장"];
                    aiWord = lastChar + easySuffix[Math.floor(Math.random() * easySuffix.length)];
                }
            }
        }

        usedWords.push(aiWord);
        currentWord = aiWord;
        
        isAITurnActive = false;
        updateUI();
        startTimer();
    }

    function buyItem(type, price) {
        if (money < price) { alert("자산이 부족합니다! 게임에서 정답을 맞춰 돈을 모으세요."); return; }
        money -= price;
        inventory[type]++;
        updateUI();
    }

    function useItem(type) {
        if (inventory[type] <= 0) { showMessage("보유한 아이템이 없습니다!"); return; }
        if (type === 'shield' && hasShield) { showMessage("이미 쉴드를 장착 중입니다!"); return; }

        inventory[type]--; 

        if (type === 'hint') {
            const lastChar = currentWord.charAt(currentWord.length - 1);
            alert(`[힌트] '${lastChar}'(으)로 시작하는 단어! (예: ${lastChar}기, ${lastChar}자)`);
        } else if (type === 'pass') {
            showMessage("턴 패스! AI가 강제로 새 단어를 냅니다.");
            executeAITurn();
        } else if (type === 'time') {
            showMessage("10초간 시간이 정지됩니다!");
            isTimeStopped = true;
            updateTimerBar();
            setTimeout(() => { isTimeStopped = false; updateTimerBar(); }, 10000);
        } else if (type === 'shield') {
            hasShield = true;
            showMessage("쉴드 장착 완료! (1회 보호)");
        }
        updateUI();
    }
</script>
</body>
</html>
